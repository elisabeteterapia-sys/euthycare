research_brief: |
  ## Content Marketing para HealthTech/SaaS voltado a Terapeutas

  ### Contexto de Mercado
  - Mercado de terapia online projetado para R$ 15.9 bilhões até 2026
  - Buscas por "terapeuta perto de mim" crescem 150% ao ano
  - 91% dos consumidores preferem marcas autênticas e transparentes

  ### O Que Funciona para Este Público
  - Conteúdo educativo que demonstra expertise: artigos sobre regulamentação, dicas práticas
  - Autenticidade é fundamental — terapeutas são céticos com marketing agressivo
  - Carrosséis são o formato workhorse do Instagram B2B: explicam ideias complexas visualmente
  - Reels são o melhor canal de descoberta para novos seguidores
  - Emails com 30-50 chars no subject + preview text complementar têm melhor open rate

  ### Anti-Patterns do Setor
  - Conteúdo genérico de "saúde mental" sem foco no profissional (≠ público-alvo)
  - Tom de autoajuda — a Euthycare fala com o terapeuta, não com o paciente
  - Promessas infladas sem dados reais de mercado
  - Ignorar o vocabulário regulatório (CFP, resolução, CRP) que legitima a marca

  ### Vocabulário Profissional do Setor
  Use: terapeuta, psicólogo, psicanalista, supervisão, sessão, prontuário, teleatendimento, CFP, CRP, LGPD, resolução, prontuário eletrônico, agenda online
  Evite: psico, cliente (para paciente), saúde emocional (muito vago), mindfulness (associado a conteúdo de autoajuda)

