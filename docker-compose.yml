version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

