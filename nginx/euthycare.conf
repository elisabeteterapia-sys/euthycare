# ══════════════════════════════════════════════════════════════
#  Nginx — EuthyCare Production
#  Copia este ficheiro para: /etc/nginx/sites-available/euthycare
#  Depois: ln -s /etc/nginx/sites-available/euthycare /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════════════

# ── Redirecionar HTTP → HTTPS ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name euthycare.pt www.euthycare.pt api.euthycare.pt;

    # Certbot challenge (não redirecionar este caminho)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend — euthycare.pt ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name euthycare.pt www.euthycare.pt;

    # SSL — certificados gerados pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/euthycare.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/euthycare.pt/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # www → apex
    if ($host = www.euthycare.pt) {
        return 301 https://euthycare.pt$request_uri;
    }

    # Cabeçalhos de segurança
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/euthycare-web-access.log;
    error_log  /var/log/nginx/euthycare-web-error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Ficheiros estáticos Next.js (_next/static) — cache longa
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Ficheiros públicos (public/)
    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Tudo o resto → Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Backend API — api.euthycare.pt ────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.euthycare.pt;

    # SSL — pode usar o mesmo certificado se for wildcard, ou gerar separado
    ssl_certificate     /etc/letsencrypt/live/api.euthycare.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.euthycare.pt/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Cabeçalhos de segurança
    add_header X-Frame-Options        "DENY"  always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/euthycare-api-access.log;
    error_log  /var/log/nginx/euthycare-api-error.log;

    # Limite de tamanho do body (uploads de PDF até 50 MB)
    client_max_body_size 55M;

    # Timeout maior para uploads
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;

    # Webhook Stripe — raw body, sem buffer
    location ~ ^/(billing|loja)/webhook {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # Tudo o resto → Express
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
